name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Lint (ruff)
        run: ruff check .

      - name: Test (pytest)
        run: pytest

  docker-smoke:
    runs-on: ubuntu-latest
    needs: lint-and-test
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build image
        uses: docker/build-push-action@v7
        with:
          context: .
          push: false
          load: true
          tags: hello-api:ci

      - name: Run container and curl /api/hello
        run: |
          docker run -d --name hello-api -p 3000:3000 hello-api:ci
          for i in $(seq 1 30); do
            if curl -fsS http://127.0.0.1:3000/api/hello; then
              echo "OK"
              exit 0
            fi
            sleep 1
          done
          echo "curl failed"
          docker logs hello-api
          exit 1
